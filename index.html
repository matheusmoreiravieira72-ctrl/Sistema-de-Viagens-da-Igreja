<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Viagens da Igreja</title>
    <!-- 
        PARTE 2: COMENTÁRIOS NO CSS (Aluno 2)
        O CSS define a aparência visual do sistema. 
        Uma "CLASSE CSS" (extra) é um seletor que permite aplicar o mesmo estilo a vários elementos.
    -->
    <style>
        /* Define a fonte principal, cores de fundo e remove margens padrão para um visual limpo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }

        /* Container centralizado para limitar a largura do sistema em telas grandes */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Estilização do título principal */
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        /* Layout em duas colunas para o formulário e o mapa do ônibus */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* Estilo para rótulos e campos de entrada do formulário */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Garante que o padding não aumente o tamanho final */
        }

        /* Botão de cadastro com efeito de hover (ao passar o mouse) */
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        /* Estilização visual do ônibus */
        .mapa-onibus {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        /* Grade para representar as cadeiras do ônibus */
        .cadeiras-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        /* Estilo individual da cadeira */
        .cadeira {
            padding: 10px;
            background: #bdc3c7;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Classe para cadeira ocupada */
        .cadeira.ocupada {
            background-color: #e74c3c;
            color: white;
            cursor: not-allowed;
        }

        /* Classe para cadeira selecionada no momento */
        .cadeira.selecionada {
            background-color: #3498db;
            color: white;
            box-shadow: 0 0 5px #3498db;
        }

        /* Tabela de listagem de viajantes */
        .lista-viagem {
            margin-top: 30px;
            width: 100%;
            border-collapse: collapse;
        }

        .lista-viagem th, .lista-viagem td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .lista-viagem th {
            background-color: #3498db;
            color: white;
        }

        /* Responsividade para telas de celular */
        @media (max-width: 600px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            PARTE 1: COMENTÁRIOS NO HTML (Aluno 1)
            O HTML define a estrutura e o significado do conteúdo da página.
        -->

        <!-- Título principal da página -->
        <h1>⛪ Sistema de Controle de Viagens</h1>

        <div class="grid-layout">
            <!-- Seção do formulário de cadastro -->
            <section>
                <h3>📝 Cadastro de Viajante</h3>
                <form id="formViajante">
                    <!-- Campo para o nome completo -->
                    <div class="form-group">
                        <label for="nome">Nome do Fiel:</label>
                        <input type="text" id="nome" placeholder="Digite o nome completo" required>
                    </div>

                    <!-- Seleção do quarto de hotel (Validação de capacidade ocorre no JS) -->
                    <div class="form-group">
                        <label for="quarto">Número do Quarto:</label>
                        <select id="quarto" required>
                            <option value="">Selecione um quarto</option>
                            <option value="101">Quarto 101 (Duplo)</option>
                            <option value="102">Quarto 102 (Duplo)</option>
                            <option value="201">Quarto 201 (Triplo)</option>
                        </select>
                    </div>

                    <!-- Status do pagamento para controle financeiro -->
                    <div class="form-group">
                        <label for="pagamento">Status do Pagamento:</label>
                        <select id="pagamento" required>
                            <option value="Pendente">Pendente</option>
                            <option value="Pago">Pago</option>
                        </select>
                    </div>

                    <!-- Campo oculto que armazena a cadeira selecionada pelo clique -->
                    <input type="hidden" id="cadeiraSelecionada" value="">

                    <!-- Botão que dispara o evento de submissão do formulário -->
                    <button type="submit">Confirmar Reserva</button>
                </form>
            </section>

            <!-- Seção visual do mapa do ônibus -->
            <section class="mapa-onibus">
                <h3>🚌 Mapa do Ônibus</h3>
                <p><small>Selecione uma cadeira disponível</small></p>
                <div class="cadeiras-grid" id="gridOnibus">
                    <!-- As cadeiras serão geradas dinamicamente pelo JavaScript -->
                </div>
            </section>
        </div>

        <!-- Tabela para exibir os viajantes cadastrados em tempo real -->
        <section>
            <h3>👥 Lista de Passageiros</h3>
            <table class="lista-viagem">
                <thead>
                    <tr>
                        <th>Cadeira</th>
                        <th>Nome</th>
                        <th>Quarto</th>
                        <th>Pagamento</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <!-- Linhas inseridas via manipulação do DOM no JS -->
                </tbody>
            </table>
        </section>
    </div>

    <!-- 
        PARTE 3: COMENTÁRIOS NO JAVASCRIPT (Aluno 3)
        O JavaScript controla o comportamento e a lógica do sistema.
    -->
    <script>
        /**
         * EXTRA: CONCEITOS TÉCNICOS
         * DOM (Document Object Model): É a representação do HTML que o JavaScript pode alterar.
         * EVENTO: É uma ação detectada pelo navegador (clique, envio de formulário).
         * FUNÇÃO: Um bloco de código que executa uma tarefa específica.
         */

        // --- SELEÇÃO DE ELEMENTOS (Acesso ao DOM) ---
        const form = document.getElementById("formViajante");
        const gridOnibus = document.getElementById("gridOnibus");
        const corpoTabela = document.getElementById("corpoTabela");
        const inputCadeira = document.getElementById("cadeiraSelecionada");

        // Banco de dados em memória para armazenar os viajantes
        let viajantes = [];
        const totalCadeiras = 20;
        
        // Definição de capacidade dos quartos (REGRA DO SISTEMA)
        const capacidadeQuartos = { "101": 2, "102": 2, "201": 3 };

        // --- FUNÇÕES ---

        // Função para criar as cadeiras no HTML dinamicamente
        function inicializarOnibus() {
            gridOnibus.innerHTML = ""; // Limpa o grid
            for (let i = 1; i <= totalCadeiras; i++) {
                const cadeiraDiv = document.createElement("div");
                cadeiraDiv.className = "cadeira";
                cadeiraDiv.innerText = i;
                
                // Verifica se a cadeira já está ocupada por alguém no array 'viajantes'
                if (viajantes.some(v => v.cadeira == i)) {
                    cadeiraDiv.classList.add("ocupada");
                }

                // EVENTO DE CLIQUE: Permite selecionar uma cadeira
                cadeiraDiv.addEventListener("click", () => {
                    if (cadeiraDiv.classList.contains("ocupada")) {
                        alert("Esta cadeira já está reservada!");
                        return;
                    }
                    
                    // Lógica para remover seleção de outras e marcar a atual
                    document.querySelectorAll(".cadeira").forEach(c => c.classList.remove("selecionada"));
                    cadeiraDiv.classList.add("selecionada");
                    inputCadeira.value = i; // Guarda o número no campo escondido
                });

                gridOnibus.appendChild(cadeiraDiv);
            }
        }

        // Função para atualizar a tabela de exibição (Manipulação do DOM)
        function atualizarTabela() {
            corpoTabela.innerHTML = "";
            viajantes.forEach(v => {
                const linha = `<tr>
                    <td>${v.cadeira}</td>
                    <td>${v.nome}</td>
                    <td>${v.quarto}</td>
                    <td>${v.pagamento}</td>
                </tr>`;
                corpoTabela.innerHTML += linha;
            });
        }

        // --- EVENTO PRINCIPAL: Submissão do Formulário ---
        form.addEventListener("submit", function(event) {
            event.preventDefault(); // Impede que a página recarregue ao enviar

            const nome = document.getElementById("nome").value.trim();
            const quarto = document.getElementById("quarto").value;
            const pagamento = document.getElementById("pagamento").value;
            const cadeira = inputCadeira.value;

            // --- REGRAS DO SISTEMA (Validações) ---

            // 🚫 Cadastro incompleto / Dados vazios
            if (!nome || !quarto || !cadeira) {
                alert("Por favor, preencha todos os campos e selecione uma cadeira no mapa!");
                return;
            }

            // 🚫 Duas pessoas na mesma cadeira
            if (viajantes.some(v => v.cadeira === cadeira)) {
                alert("Erro: Esta cadeira acabou de ser ocupada!");
                return;
            }

            // 🚫 Quarto acima da capacidade
            const ocupacaoQuarto = viajantes.filter(v => v.quarto === quarto).length;
            if (ocupacaoQuarto >= capacidadeQuartos[quarto]) {
                alert(`Erro: O quarto ${quarto} já atingiu o limite de ${capacidadeQuartos[quarto]} pessoas!`);
                return;
            }

            // Se passar pelas validações, adiciona ao "banco de dados"
            viajantes.push({ nome, quarto, pagamento, cadeira });

            // Reseta o formulário e atualiza a interface
            form.reset();
            inputCadeira.value = "";
            inicializarOnibus();
            atualizarTabela();
            
            alert("Reserva realizada com sucesso! 🙏");
        });

        // Inicia o sistema gerando o ônibus vazio
        window.onload = inicializarOnibus;

    </script>
</body>
</html>
